<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <table border="1" width="30%">
            <form>
                <tr>
                    <th colspan="2">Pizza Shop 2.0 </th>
                </tr>
                <tr>
                    <td>Name</td>
                    <td>
                        <div>
                            <lable for="name"></lable>
                            <input type="text" id="name" name="name">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>Pizza topping</td>
                    <td>
                        <div>
                            <input type="checkbox" id="toppings" name="toppings">Supreme <br>
                            <input type="checkbox" id="toppings" name="toppings">Vegetarian <br>
                            <input type="checkbox" id="toppings" name="toppings">Hawaiian
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>Pizza Sauce</td>
                    <td>
                        <select>
                            <option value="tommato">Tommato</option>
                            <option value="Red">Red</option>
                            <option value="White">White</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Optional Extras</td>
                    <td>
                        <div>
                            <input type="checkbox" name="extras"> Extra Cheese
                            <input type="checkbox" name="extras">Gluten free Base
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">Delivery Instruction:
                        <div>
                            <textarea rows="3" cols="50" placeholder="Enter delivery instructions here..."></textarea>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="Submit" value="Send my Order">
                    </td>
                </tr>
            </form>
        </table>


    </center>

</body>

</html>
