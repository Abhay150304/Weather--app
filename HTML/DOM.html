<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
</head>
<body>

<h2 id="count">0</h2>

<button onclick="increase()">Increase</button>
<button onclick="decrease()">Decrease</button>
<button onclick="reset()">Reset</button>

<script>
let count = 0;

function increase() {
    count++;
    document.getElementById("count").innerHTML = count;
}

function decrease() {
    count--;
    document.getElementById("count").innerHTML = count;
}

function reset() {
    count = 0;
    document.getElementById("count").innerHTML = count;
}
</script>

</body>
</html>
